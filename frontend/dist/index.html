<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Felix Voice Assistant</title>
    <script type="module" crossorigin src="/assets/index-s4uWxo2L.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-D6AMbPm6.css">
  </head>
  <body>
    <!-- Three.js renders here -->
    <canvas id="orb-canvas"></canvas>

    <!-- Status text above the label -->
    <div id="status-text"></div>

    <!-- Persistent label at the very bottom -->
    <div id="assistant-label">VOICE ASSISTANT</div>

    <!-- Connection indicator — top-right -->
    <div id="connection-badge">
      <span id="connection-dot"></span>
      <span id="connection-label">connecting</span>
    </div>

    <!-- Mute toggle -->
    <button id="mute-button" type="button" aria-pressed="false" aria-label="Mute microphone">
      mute
    </button>

    <!-- Language toggle -->
    <button id="lang-button" type="button" data-lang="en" aria-label="Toggle language">
      <span id="lang-flag">🇺🇸</span><span id="lang-label">EN</span>
    </button>

    <!-- Error / info toast -->
    <div id="error-text"></div>

  </body>
</html>
